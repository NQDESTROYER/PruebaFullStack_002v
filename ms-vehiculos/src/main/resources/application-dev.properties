# ===================================================================
# CONFIGURACIÓN EXCLUSIVA PARA EL AMBIENTE DE DESARROLLO (DEV)
# ===================================================================

# Base de datos: Esquema de desarrollo exclusivo para Vehículos en Laragon
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/db_ms_vehiculos_dev?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# Hibernate en Desarrollo: Actualiza tablas existentes y muestra el SQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Control de logs para evitar ruido innecesario
logging.level.root=INFO