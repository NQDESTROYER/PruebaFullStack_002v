# ===================================================================
# CONFIGURACIÓN EXCLUSIVA PARA EL AMBIENTE DE PRUEBAS (TEST)
# ===================================================================

# Base de datos: Esquema de pruebas exclusivo para Vehículos en Laragon
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/db_ms_vehiculos_test?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# Desactivamos Flyway SOLO en tests para que Hibernate use libremente su ciclo limpio de borrar/crear
spring.flyway.enabled=false

# Hibernate en Tests: Estructura limpia (crea tablas al iniciar y las destruye al finalizar)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Logs mínimos para mantener la consola de pruebas limpia
logging.level.root=WARN