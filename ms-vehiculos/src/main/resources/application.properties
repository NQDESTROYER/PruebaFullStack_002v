# Definir el perfil activo por defecto
spring.profiles.active=dev

# ParÃmetros comunes del microservicio de vehÚculos
spring.application.name=MS-VEHICULOS
server.port=8082

# Conexiµn a Eureka Server (Comºn para todo el ecosistema)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Configuraciµn Swagger / OpenAPI (Estandarizada para el API Gateway)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs

# Estrategia de Proxy para el enrutamiento correcto
server.forward-headers-strategy=framework

# Configuraciµn base de Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# CRëTICO: Esperar a que las migraciones de Flyway se completen antes de ejecutar el DataInitializer
spring.jpa.defer-datasource-initialization=true