spring.application.name=ms-sucursales



# CONFIGURACI”N DEL SERVIDOR
# Puerto exigido para ms-sucursales
server.port=8085


# CONFIGURACI”N DE BASE DE DATOS
# ConexiÛn a la BD 'prueba1'. createDatabaseIfNotExist la crea autom·ticamente si no existe.
spring.datasource.url=jdbc:mysql://localhost:3307/prueba1?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# CONFIGURACI”N DE JPA / HIBERNATE
# Actualiza las tablas autom·ticamente bas·ndose en tus entidades @Entity
spring.jpa.hibernate.ddl-auto=update
# Muestra por consola las consultas SQL que hace por debajo
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# LOGS (SLF4J)
# Activa los logs informativos para tu paquete principal
logging.level.com.example.ms_sucursales=INFO
