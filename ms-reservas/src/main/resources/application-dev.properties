server.port=8083

# BASE DE DATOS DE DESARROLLO
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/prueba2_dev?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraciˇn de JPA / Hibernate para desarrollo
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Migraciones activas en desarrollo
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.level.root=INFO