spring.application.name=ms-clientes
server.address=0.0.0.0
server.port=8081

# CONEXION A BASE DE DATOS
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/ms_clientes?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACION HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# CONFIGURACION SWAGGER OPEN API
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Registros de Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Permite que entienda el ruteo del Gateway
server.forward-headers-strategy=framework

logging.level.root=INFO