spring.application.name=ms-clientes
server.address=0.0.0.0
server.port=8081

# HABILITAR Swagger UI
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Base de datos: Forzamos 'create' para limpiar tablas y que entren los 5 clientes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# CONFIGURACI”N DE LOGS INTELIGENTE (Limpiamos el ruido)
logging.level.root=INFO
# Si quieres ver a detalle quť hace Hibernate o Eureka sin romper la consola, des comenta estas:
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.com.netflix.discovery=INFO