spring.profiles.active=dev
spring.application.name=MS-CLIENTES
server.port=8081

# CONFIGURACIÓN DE BASE DE DATOS (Base de datos exclusiva para Clientes)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/db_ms_clientes?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACIÓN DE JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
# Eliminamos el dialecto obsoleto para que Spring Boot autodetecte la versión óptima de MySQL en Laragon
spring.jpa.show-sql=true

# CONEXIÓN A EUREKA SERVER
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# CONFIGURACIÓN SWAGGER / OPENAPI (Estandarizada para API Gateway)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs

# ESTRATEGIA DE PROXY (Necesaria para que el Gateway encamine bien las peticiones)
server.forward-headers-strategy=framework

# ADVERTENCIA PARA INICIALIZACIÓN DE DATOS (Igual que en ms-vehiculos)
spring.jpa.defer-datasource-initialization=true

logging.level.root=INFO