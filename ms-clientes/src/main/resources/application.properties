# Definir el perfil activo por defecto
spring.profiles.active=dev

# ParŠmetros comunes del microservicio de clientes
spring.application.name=MS-CLIENTES
server.port=8081

# CONEXI”N A EUREKA SERVER (Comķn para todo el ecosistema)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# CONFIGURACI”N SWAGGER / OPENAPI (Estandarizada para API Gateway)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs

# ESTRATEGIA DE PROXY (Necesaria para que el Gateway encamine bien las peticiones)
server.forward-headers-strategy=framework

# CONFIGURACI”N BASE DE FLYWAY
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# CRÕTICO: Esperar a que las migraciones de Flyway se completen antes de ejecutar el DataInitializer
spring.jpa.defer-datasource-initialization=true