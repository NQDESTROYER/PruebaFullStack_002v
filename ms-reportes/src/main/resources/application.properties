spring.profiles.active=dev
spring.application.name=ms-reportes
server.port=8087

# CONFIGURACIėN DE BASE DE DATOS (Puerto 3306 de Laragon)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/prueba4?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACIėN DE JPA / HIBERNATE (Corregido para que no compita con Liquibase)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# MIGRACIONES CON LIQUIBASE
spring.liquibase.change-log=classpath:db_migration/db.changelog-master.yaml

# CONEXIėN A EUREKA SERVER
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# CONFIGURACIėN SWAGGER / OPENAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs

# ESTRATEGIA DE PROXY
server.forward-headers-strategy=framework

logging.level.root=INFO