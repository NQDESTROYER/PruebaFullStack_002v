databaseChangeLog:
  - changeSet:
      id: 1-crear-tabla-reportes
      author: tomas
      changes:
        - createTable:
            tableName: reportes
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nombre_reporte
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: categoria
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: total_registros
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: fecha_emision
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: procesado
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(255)
                  constraints:
                    nullable: false

  - changeSet:
      id: 2-poblar-datos-iniciales
      author: tomas
      changes:
        - insert:
            tableName: reportes
            columns:
              - column: { name: nombre_reporte, value: "Reporte Mensual de Ventas" }
              - column: { name: categoria, value: "FINANZAS" }
              - column: { name: total_registros, value: 25 }
              - column: { name: fecha_emision, value: "2026-05-12" }
              - column: { name: description, value: "Análisis de ingresos por arriendo" }
        - insert:
            tableName: reportes
            columns:
              - column: { name: nombre_reporte, value: "Disponibilidad de Vehículos" }
              - column: { name: categoria, value: "OPERACIONES" }
              - column: { name: total_registros, value: 120 }
              - column: { name: fecha_emision, value: "2026-05-15" }
              - column: { name: description, value: "Flota operativa total" }
        - insert:
            tableName: reportes
            columns:
              - column: { name: nombre_reporte, value: "Auditoría de Sucursales Activas" }
              - column: { name: categoria, value: "ESTADISTICA" }
              - column: { name: total_registros, value: 8 }
              - column: { name: fecha_emision, value: "2026-05-17" }
              - column: { name: description, value: "Rendimiento geográfico de sedes" }
        - insert:
            tableName: reportes
            columns:
              - column: { name: nombre_reporte, value: "Clientes con Pagos Atrasados" }
              - column: { name: categoria, value: "RIESGO" }
              - column: { name: total_registros, value: 14 }
              - column: { name: fecha_emision, value: "2026-06-01" }
              - column: { name: description, value: "Listado de morosidad mayor a 30 días" }
        - insert:
            tableName: reportes
            columns:
              - column: { name: nombre_reporte, value: "Proyección Ingresos Q3" }
              - column: { name: categoria, value: "GERENCIA" }
              - column: { name: total_registros, value: 350 }
              - column: { name: fecha_emision, value: "2026-07-01" }
              - column: { name: description, value: "Estimación basada en reservas futuras" }