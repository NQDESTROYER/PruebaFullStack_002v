databaseChangeLog:
  - changeSet:
      id: 1
      author: sistema
      changes:
        - createTable:
            tableName: reportes
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: nombre_reporte
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: fecha_generacion
                  type: datetime
                  constraints:
                    nullable: false
              - column:
                  name: contenido
                  type: text
                  constraints:
                    nullable: false
  - changeSet:
      id: 2
      author: sistema
      changes:
        - insert:
            tableName: reportes
            columns:
              - column:
                  name: nombre_reporte
                  value: "Reporte Mensual"
              - column:
                  name: fecha_generacion
                  value: "2026-06-18 10:00:00"
              - column:
                  name: contenido
                  value: "Contenido del reporte mensual..."