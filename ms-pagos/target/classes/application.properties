spring.profiles.active=dev
spring.application.name=ms-pagos
server.port=8084

# CONFIGURACI�N DE BASE DE DATOS (Mantenemos tu puerto 3306)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/prueba3?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACI�N DE JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# MIGRACIONES CON FLYWAY (Configuraci�n robusta para desarrollo local)
spring.flyway.enabled=true
spring.flyway.clean-disabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.clean-on-validation-error=true
spring.flyway.locations=classpath:db_migration

# CONEXI�N A EUREKA SERVER
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# CONFIGURACI�N SWAGGER / OPENAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs

# ESTRATEGIA DE PROXY
server.forward-headers-strategy=framework

logging.level.root=INFO