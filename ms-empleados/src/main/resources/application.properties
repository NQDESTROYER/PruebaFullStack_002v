spring.application.name=ms-empleados

server.port=8086

# Configuración de la Base de Datos en Laragon (Asegúrate de que la BD se llame db_empleados o cámbiala por la tuya)
spring.datasource.url=jdbc:mysql://localhost:3306/prueba1?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Configuración de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
